# Customize: user, ports, dns, traefik labels for your environment
services:
  the-sommelier:
    build: .
    container_name: the-sommelier
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
      - SYNC_SCHEDULE=0 2 * * *
    volumes:
      - ./:/app
      - ~/.ssh/id_ed25519_ha:/run/secrets/ha_ssh_key:ro
    dns:
      - 10.10.1.10
      - 10.10.1.11
      - 8.8.8.8
    labels:
      traefik.enable: 'true'
      traefik.http.routers.the-sommelier.entrypoints: https
      traefik.http.routers.the-sommelier.rule: Host(`the-sommelier.unibrain.org`)
      traefik.http.routers.the-sommelier.tls: 'true'
      traefik.http.services.the-sommelier.loadbalancer.server.port: '8080'
    networks:
      - traefik_proxy
    ports:
      - "8089:8080"
    restart: unless-stopped

  run-now:
    build: .
    container_name: the-sommelier-run
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./:/app
      - ~/.ssh/id_ed25519_ha:/run/secrets/ha_ssh_key:ro
    dns:
      - 10.10.1.10
      - 10.10.1.11
      - 8.8.8.8
    entrypoint: []
    command: ["bash", "/app/fetch_docker.sh"]
    networks:
      - traefik_proxy
    profiles:
      - run-now

networks:
  traefik_proxy:
    external: true
